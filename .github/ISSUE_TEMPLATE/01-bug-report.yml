name: Bug report
description: Report reproducible incorrect behavior in the extension
title: "[Bug]: "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Remove NYU credentials, student data, private URLs, session details, and other personal information before submitting.
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      description: Find this in the popup or extension details page.
      placeholder: "0.1.11"
    validations:
      required: true
  - type: input
    id: browser-version
    attributes:
      label: Browser and version
      placeholder: "Chrome 140"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Albert area
      options:
        - Course Search
        - Shopping Cart
        - Enrolled Courses
        - Extension popup
        - Build or verification tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened?
      description: Describe the visible behavior and any privacy-safe error text.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open a redacted Albert page...
        2. Open the extension popup...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Privacy-safe diagnostics
      description: Paste the extension's Copy diagnostics output. Do not paste page HTML or account data.
      render: text
  - type: textarea
    id: screenshots
    attributes:
      label: Redacted screenshots
      description: Drag images here only after removing names, IDs, schedules, URLs, and account information.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed credentials, student data, and other private information.
          required: true
        - label: I agree to follow the Code of Conduct.
          required: true
